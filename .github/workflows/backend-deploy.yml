name: Deploy Backend Despachos to ECR

on:
  push:
    branches:
      - deploy
    paths:
      - 'proyecto semestral/back-Despachos_SpringBoot/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
          file: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile"
          push: true
          tags: |
            ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest
            ${{ secrets.ECR_REPO_URL_DESPACHOS }}:${{ github.sha }}