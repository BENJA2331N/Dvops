name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - deploy
      - main
    paths:
      - 'proyecto semestral/back-Despachos_SpringBoot/**'
      - 'proyecto semestral/back-Ventas_SpringBoot/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- DESPACHOS SERVICE DEPLOYMENT ---
      - name: Build, tag, and push Despachos image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
          file: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile"
          push: true
          tags: |
            ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:latest
            ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:${{ github.sha }}

      - name: Download active task definition for Despachos
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION_DESPACHOS }} --query taskDefinition > task-def-despachos.json

      - name: Fill in the new image ID in the Despachos task definition
        id: render-despachos
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-despachos.json
          container-name: ${{ secrets.ECS_CONTAINER_NAME_DESPACHOS }}
          image: ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHOS }}:${{ github.sha }}

      - name: Deploy Despachos to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-despachos.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME_DESPACHOS }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true

      # --- VENTAS SERVICE DEPLOYMENT ---
      - name: Build, tag, and push Ventas image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: "./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST"
          file: "./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile"
          push: true
          tags: |
            ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest
            ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:${{ github.sha }}

      - name: Download active task definition for Ventas
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION_VENTAS }} --query taskDefinition > task-def-ventas.json

      - name: Fill in the new image ID in the Ventas task definition
        id: render-ventas
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-ventas.json
          container-name: ${{ secrets.ECS_CONTAINER_NAME_VENTAS }}
          image: ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:${{ github.sha }}

      - name: Deploy Ventas to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-ventas.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME_VENTAS }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
