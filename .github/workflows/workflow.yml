name: Build and Deploy to Amazon EKS

on:
  push:
    branches: [ deploy ]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: Dvops-examen

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          REPOS=("back-despachos" "back-ventas" "front-despacho")
          for REPO in "${REPOS[@]}"; do
            aws ecr describe-repositories --repository-names $REPO --region ${{ env.AWS_REGION }} || aws ecr create-repository --repository-name $REPO --region ${{ env.AWS_REGION }}
          done

      - name: Build and push Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/back-despachos:latest
            ${{ steps.login-ecr.outputs.registry }}/back-despachos:${{ github.sha }}

      - name: Build and push Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest
            ${{ steps.login-ecr.outputs.registry }}/back-ventas:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/front-despacho:latest
            ${{ steps.login-ecr.outputs.registry }}/front-despacho:${{ github.sha }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Inject dynamic variables into manifests
        run: |
          DB_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --query "Reservations[0].Instances[0].PrivateIpAddress" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "La IP privada de la base de datos es: $DB_IP"
          
          sed -i "s|REPLACE_DB_ENDPOINT|$DB_IP|g" k8s/00-namespace-config.yaml
          
          sed -i "s|REPLACE_IMAGE_BACKEND_DESPACHOS|${{ steps.login-ecr.outputs.registry }}/back-despachos:${{ github.sha }}|g" k8s/01-backend-despachos.yaml
          sed -i "s|REPLACE_IMAGE_BACKEND_VENTAS|${{ steps.login-ecr.outputs.registry }}/back-ventas:${{ github.sha }}|g" k8s/02-backend-ventas.yaml
          sed -i "s|REPLACE_IMAGE_FRONTEND|${{ steps.login-ecr.outputs.registry }}/front-despacho:${{ github.sha }}|g" k8s/03-frontend.yaml

      - name: Deploy manifests to EKS
        run: |
          kubectl apply -f k8s/

      - name: Verify deployment
        run: |
          kubectl get all -n innovatech
          kubectl get pods -n innovatech -o wide
