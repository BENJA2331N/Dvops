version: '3.8'

services:
  base-de-datos:
    image: mysql:8.0
    container_name: despacho_db
    environment:
      MYSQL_DATABASE: despacho_db
      MYSQL_USER: despacho_user
      MYSQL_PASSWORD: despacho_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  api-despachos:
    build:
      context: ./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: despacho_backend
    ports:
      - "8081:8081"
    environment:
      - DB_ENDPOINT=base-de-datos
      - DB_PORT=3306
      - DB_NAME=despacho_db
      - DB_USERNAME=despacho_user
      - DB_PASSWORD=despacho_password
    depends_on:
      - base-de-datos
    restart: always

  api-ventas:
    build:
      context: ./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: ventas_backend
    ports:
      - "8082:8082"
    environment:
      - DB_ENDPOINT=base-de-datos
      - DB_PORT=3306
      - DB_NAME=despacho_db
      - DB_USERNAME=despacho_user
      - DB_PASSWORD=despacho_password
      - SERVER_PORT=8082
    depends_on:
      - base-de-datos
    restart: always

  web-frontend:
    build:
      context: ./proyecto semestral/front_despacho
      dockerfile: Dockerfile
    container_name: despacho_frontend
    ports:
      - "80:8080"
    environment:
      - BACKEND_HOST=api-despachos
      - VENTAS_HOST=api-ventas
    depends_on:
      - api-despachos
      - api-ventas
    restart: always

volumes:
  db_data:
