---


apiVersion: v1
kind: Namespace
metadata:
  name: innovatech
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos-deployment
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despachos
  template:
    metadata:
      labels:
        app: despachos
    spec:
      containers:
        - name: despachos-container
          image: nginx:latest # El pipeline cambiará esto automáticamente por tu ECR
          ports:
            - containerPort: 8081
          env:
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "despacho_db"
            - name: DB_USERNAME
              value: "despacho_user"
---
apiVersion: v1
kind: Service
metadata:
  name: despachos-service
  namespace: innovatech
spec:
  type: ClusterIP
  selector:
    app: despachos
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
