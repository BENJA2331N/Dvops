apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: nginx:latest # El pipeline cambiará esto automáticamente por tu ECR
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: innovatech
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer # IMPORTANTE: Crea el balanceador en AWS para darte URL pública
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

