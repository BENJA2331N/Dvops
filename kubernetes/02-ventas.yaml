apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas-deployment
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas
  template:
    metadata:
      labels:
        app: ventas
    spec:
      containers:
        - name: ventas-container
          image: nginx:latest # El pipeline cambiará esto automáticamente por tu ECR
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: ventas-service
  namespace: innovatech
spec:
  type: ClusterIP
  selector:
    app: ventas
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
