apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      containers:
      - name: backend-despachos
        image: REPLACE_IMAGE_BACKEND_DESPACHOS
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-despachos
  namespace: innovatech
spec:
  selector:
    app: backend-despachos
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
