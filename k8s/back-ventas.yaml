apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
        - name: back-ventas
          image: 892274277213.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: back-ventas-secret
                  key: SPRING_PROFILES_ACTIVE
                  - name: DB_ENDPOINT
              value: "database"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "db_proyecto"
            - name: DB_USERNAME
              value: "user_proyecto"
            - name: DB_PASSWORD
              value: "password_proyecto"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
spec:
  selector:
    app: back-ventas
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
