apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: REPLACE_IMAGE_FRONTEND
        ports:
        - containerPort: 8080
        env:
        - name: BACKEND_HOST
          value: "backend-despachos"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: innovatech
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
